<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>RPG Fútbol por turnos (Canvas)</title>
    <style>
      @font-face {
        font-family: "PressStart2P";
        src: url("./assets/PressStart2P-Regular.woff2") format("woff2");
        font-display: swap;
      }
      @font-face {
        font-family: "Pixelade";
        src: url("./assets/Pixelade.woff2") format("woff2");
        font-display: swap;
      }
      :root {
        --bg: #1b1f24;
      }
      html,
      body {
        height: 100%;
      }
      body {
        margin: 0;
        background: var(--bg);
        display: grid;
        place-items: center;
        font-family: PressStart2P, Pixelade, ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas,
          "Liberation Mono", "Courier New", monospace;
      }
      .wrap {
        width: min(980px, 100vw);
        display: grid;
        place-items: center;
        padding: 16px;
        box-sizing: border-box;
        gap: 10px;
      }
      canvas {
        width: min(960px, 100%);
        aspect-ratio: 256 / 240;
        image-rendering: pixelated;
        image-rendering: crisp-edges;
        background: #0b0e12;
        border-radius: 6px;
        outline: 2px solid #0b2d4d;
      }
      .hint {
        color: rgba(255, 255, 255, 0.7);
        font-size: 12px;
        line-height: 1.4;
        text-align: center;
        max-width: 800px;
      }
    </style>
  </head>
  <body>
    <div class="wrap">
      <canvas id="game" width="256" height="240" aria-label="Juego Canvas" tabindex="0"></canvas>
      <div class="hint">
        Clic dentro del juego para activar el control · Movimiento: Flechas · Confirmar: Enter/Espacio · Atrás: Escape · Escribir números en el reto: 0-9
      </div>
    </div>
    <script>
      (() => {
        const c = document.getElementById("game");
        if (!c) return;
        const focus = () => {
          try {
            c.focus({ preventScroll: true });
          } catch {
            c.focus();
          }
        };
        window.addEventListener("load", () => setTimeout(focus, 0));
        c.addEventListener("pointerdown", focus);
      })();
    </script>
    <script>
      (() => {
        const s = document.createElement("script");
        s.src = `./game.js?v=${Date.now()}`;
        document.body.appendChild(s);
      })();
    </script>
  </body>
</html>
